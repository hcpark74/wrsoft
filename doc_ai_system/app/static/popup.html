<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Intel - AI 어시스턴트</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── 디자인 토큰 ── */
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #263044;
            --accent: #38bdf8;
            --accent-dim: rgba(56, 189, 248, 0.12);
            --accent-border: rgba(56, 189, 248, 0.25);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --text-1: #f8fafc;
            --text-2: #94a3b8;
            --msg-user-bg: #0369a1;
            /* 더 짙은 파란색 (메신저 스타일) */
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        /* ── 리셋 ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-1);
        }

        .popup-wrap {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* ── 헤더 ── */
        .popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .popup-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo {
            height: 22px;
            /* 헤더 높이에 맞춘 로고 크기 */
            width: auto;
            object-fit: contain;
        }

        .model-tag {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-2);
            background: var(--glass);
            border-radius: 20px;
            padding: 1px 8px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .status-dot.processing {
            background: #fbbf24;
            animation: blink 1s ease infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-2);
            cursor: pointer;
        }

        /* ── 메시지 영역 ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--surface-2);
            border-radius: 3px;
        }

        /* 웰컴 스크린 */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }

        .welcome-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-dim);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border: 1px solid var(--accent-border);
        }

        .welcome-screen h3 {
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .welcome-screen p {
            font-size: 0.8rem;
            color: var(--text-2);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .suggestion-chips {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 240px;
        }

        .chip {
            padding: 9px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-2);
            font-size: 0.78rem;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ── 메시지 레이아웃 ── */
        .message {
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.25s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── 유저 메시지 - Gemini 스타일 ── */
        .user-message {
            align-self: flex-end;
            max-width: 78%;
        }

        .user-message-content {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-1);
            padding: 10px 16px;
            border-radius: 20px 20px 4px 20px;
            font-size: 0.9rem;
            line-height: 1.6;
            word-break: break-word;
        }

        /* ── AI 메시지 - Gemini 스타일: 버블 없음, 전체 너비 ── */
        .ai-message {
            align-self: stretch;
            flex-direction: row !important;
            align-items: flex-start;
            gap: 12px;
            max-width: 100% !important;
            padding-top: 4px;
        }

        .ai-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            margin-top: 2px;
            background: linear-gradient(135deg, #4285f4 0%, #9b59b6 100%);
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.3);
        }

        .ai-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* AI 답변 본문 - Gemini 스타일: 배경 없음 */
        .ai-message-content {
            flex: 1;
            min-width: 0;
            background: transparent;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-1);
        }

        /* ── 마크다운 스타일 (Claude 스타일) ── */
        .ai-message-content>*:first-child {
            margin-top: 0;
        }

        .ai-message-content>*:last-child {
            margin-bottom: 0;
        }

        .ai-message-content p {
            margin: 0 0 12px;
        }

        .ai-message-content h1,
        .ai-message-content h2,
        .ai-message-content h3,
        .ai-message-content h4 {
            font-weight: 700;
            line-height: 1.3;
            margin: 20px 0 8px;
            color: var(--text-1);
        }

        .ai-message-content h1 {
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        .ai-message-content h2 {
            font-size: 1rem;
        }

        .ai-message-content h3 {
            font-size: 0.93rem;
        }

        .ai-message-content ul,
        .ai-message-content ol {
            margin: 0 0 12px 20px;
            padding: 0;
        }

        .ai-message-content li {
            margin-bottom: 5px;
            line-height: 1.65;
        }

        .ai-message-content ul {
            list-style: disc;
        }

        .ai-message-content ul ul {
            list-style: circle;
            margin-bottom: 4px;
        }

        .ai-message-content ol {
            list-style: decimal;
        }

        /* 코드 블록 */
        .ai-message-content pre {
            background: #0d1117;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 14px 16px;
            margin: 12px 0;
            overflow-x: auto;
            font-size: 0.8rem;
            line-height: 1.65;
        }

        .ai-message-content pre code {
            background: transparent;
            border: none;
            padding: 0;
            border-radius: 0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            color: #e6edf3;
            font-size: inherit;
            white-space: pre;
        }

        /* 인라인 코드 */
        .ai-message-content code {
            background: rgba(110, 118, 129, 0.18);
            border: 1px solid rgba(110, 118, 129, 0.22);
            color: #e6edf3;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.82em;
        }

        /* 인용구 */
        .ai-message-content blockquote {
            border-left: 3px solid var(--accent);
            margin: 12px 0;
            padding: 8px 14px;
            background: var(--accent-dim);
            border-radius: 0 6px 6px 0;
            color: var(--text-2);
        }

        .ai-message-content blockquote p {
            margin: 0;
        }

        /* 구분선 */
        .ai-message-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        /* 테이블 */
        .ai-message-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.84rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .ai-message-content th {
            background: var(--surface-2);
            color: var(--text-1);
            font-weight: 600;
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .ai-message-content td {
            padding: 7px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-2);
        }

        .ai-message-content tr:last-child td {
            border-bottom: none;
        }

        .ai-message-content tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.02);
        }

        .ai-message-content strong {
            color: var(--text-1);
            font-weight: 600;
        }

        .ai-message-content em {
            color: var(--text-2);
        }

        /* 참조 */
        .citations {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            font-size: 0.73rem;
            color: var(--text-2);
        }

        /* ── 입력 영역 ── */
        .chat-input-area {
            padding: 12px;
            background: linear-gradient(transparent, var(--bg) 40%);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 10px 8px 16px;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-border);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-1);
            font-size: 0.9rem;
            resize: none;
            max-height: 100px;
            padding: 5px 0;
        }

        #send-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: var(--bg);
            cursor: pointer;
            transition: 0.2s;
        }

        #send-btn:hover {
            transform: scale(1.1);
            background: #7dd3fc;
        }

        .input-hint {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-2);
            margin-top: 6px;
            opacity: 0.6;
        }

        #document-list {
            display: none;
        }

        /* ── 타이핑 애니메이션 ── */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 5px 2px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
            opacity: 0.6;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }
    </style>
</head>

<body>
    <ul id="document-list"></ul>
    <div class="popup-wrap">
        <header class="popup-header">
            <div class="popup-title">
                <img src="/images/logo.png" alt="우리소프트" class="header-logo">
                <span class="model-tag">Gemini</span>
            </div>
            <div class="header-actions">
                <div class="status-dot" id="status-dot"></div>
                <button id="clear-btn" class="icon-btn" title="초기화"><i class="fas fa-rotate-left"></i></button>
                <button onclick="closePopup()" class="icon-btn" title="닫기"><i class="fas fa-times"></i></button>
            </div>
        </header>

        <div id="chat-messages" class="chat-messages">
            <div class="welcome-screen">
                <div class="welcome-icon"><i class="fas fa-comments"></i></div>
                <h3>(주)우리소프트에 대해<br>무엇이든 물어보세요</h3>
                <p>우리소프트의 기업 정보, 서비스 및 솔루션에 대해<br>AI가 실시간으로 답변해 드립니다.</p>
                <div class="suggestion-chips">
                    <button class="chip" data-text="(주)우리소프트는 어떤 회사인가요?"><i class="fas fa-building"></i> 회사 소개</button>
                    <button class="chip" data-text="우리소프트의 주요 솔루션 및 서비스를 알려주세요."><i class="fas fa-microchip"></i> 주요
                        솔루션</button>
                    <button class="chip" data-text="서비스 도입 및 PoC 신청 절차가 어떻게 되나요?"><i class="fas fa-handshake"></i> 도입 및
                        PoC 문의</button>
                </div>
            </div>
        </div>

        <footer class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="질문을 입력하세요..." rows="1"></textarea>
                <button id="send-btn"><i class="fas fa-arrow-up"></i></button>
            </div>
            <p class="input-hint">전송 Enter · 줄바꿈 Shift+Enter</p>
        </footer>
    </div>

    <script>const FIXED_MODEL = 'gemini-2.5-flash-lite';</script>
    <script src="/static/chat.js"></script>
    <script>
        const chatMessages = document.getElementById('chat-messages');
        const badge = document.getElementById('status-badge');
        const dot = document.getElementById('status-dot');

        function closePopup() {
            window.parent.postMessage('closeChatbot', '*');
        }

        if (badge && dot) {
            new MutationObserver(() => {
                dot.className = badge.classList.contains('processing') ? 'status-dot processing' : 'status-dot';
            }).observe(badge, { attributes: true, attributeFilter: ['class'] });
        }

        const messageObserver = new MutationObserver((mutations) => {
            mutations.forEach(mutation => {
                mutation.addedNodes.forEach(node => {
                    if (node.nodeType !== 1) return;
                    if (node.classList.contains('user-message')) {
                        const content = node.textContent;
                        node.textContent = '';
                        const wrap = document.createElement('div');
                        wrap.className = 'user-message-content';
                        wrap.textContent = content;
                        node.appendChild(wrap);
                    } else if (node.classList.contains('ai-message')) {
                        if (!node.querySelector('.ai-avatar')) {
                            const avatar = document.createElement('div');
                            avatar.className = 'ai-avatar';
                            avatar.innerHTML = '<img src="/images/chatbot.png" alt="AI">';
                            node.prepend(avatar);
                        }
                    }
                });
            });
        });
        messageObserver.observe(chatMessages, { childList: true });
    </script>
    <div id="status-badge" style="display:none;"></div>
</body>

</html>

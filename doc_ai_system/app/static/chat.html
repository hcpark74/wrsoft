<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Intel - AI 문서 assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="user-page">
    <div class="app-container">
        <!-- Sidebar: Document List (Read-Only) -->
        <aside class="sidebar">
            <header>
                <div class="logo">
                    <i class="fas fa-brain"></i>
                    <span>Doc Intel</span>
                </div>
            </header>

            <section class="document-list-section">
                <h3><i class="fas fa-list-ul"></i> 참조 가능한 문서</h3>
                <ul id="document-list" class="doc-list">
                    <!-- 리스트 아이템 동적 생성 -->
                    <li class="loading">조회 중...</li>
                </ul>
            </section>
        </aside>

        <!-- Main: Chat Interface -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="chat-header-left">
                    <h2>AI 문서 어시스턴트</h2>
                    <span class="subtext">업로드된 문서를 기반으로 답변합니다</span>
                </div>
                <div class="header-tools">
                    <select id="model-select" class="model-select">
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite (기본)</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro (고성능)</option>
                        <option value="gemini-3-flash-preview" selected>Gemini 3 Flash Preview (최신)</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                    </select>
                    <button id="clear-btn" class="clear-btn" title="대화 초기화">
                        <i class="fas fa-rotate-left"></i>
                        <span>초기화</span>
                    </button>
                    <select id="filter-category" class="model-select">
                        <option value="">모든 파일 검색</option>
                        <option value="marketing">마케팅</option>
                        <option value="legal">법무</option>
                        <option value="tech">기술지원</option>
                        <option value="hr">인사/복지</option>
                        <option value="company">회사소개</option>
                    </select>
                    <div class="status-badge ready" id="status-badge">준비됨</div>
                </div>
            </header>

            <div id="chat-messages" class="chat-messages">
                <div class="welcome-screen">
                    <div class="welcome-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h3>무엇이든 물어보세요</h3>
                    <p>등록된 문서를 기반으로 AI가 정확한 답변을 제공합니다.</p>
                    <div class="suggestion-chips">
                        <button class="chip" data-category="company" data-text="회사 소개와 연혁을 알려줘">
                            <i class="fas fa-building"></i> 회사소개
                        </button>
                        <button class="chip" data-category="hr" data-text="우리 회사의 복리후생 제도가 뭐야?">
                            <i class="fas fa-users"></i> 인사/복지
                        </button>
                        <button class="chip" data-category="tech" data-text="제품 기술 가이드를 요약해줘">
                            <i class="fas fa-microchip"></i> 기술지원
                        </button>
                        <button class="chip" data-category="legal" data-text="최근 계약 관련 규정을 알려줘">
                            <i class="fas fa-file-contract"></i> 법무/규정
                        </button>
                    </div>
                </div>
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="문서에 대해 무엇이든 질문하세요..." rows="1"></textarea>
                    <button id="send-btn" title="전송 (Enter)">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</p>
            </footer>
        </main>
    </div>

    <!-- Fixed model constant - not selectable by user -->
    <script src="/static/chat.js"></script>
</body>

</html>

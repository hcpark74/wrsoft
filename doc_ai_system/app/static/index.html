<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Doc Intel - AI 문서 지능 시스템</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar: Upload & Documents -->
        <aside class="sidebar">
            <header>
                <div class="logo">
                    <i class="fas fa-brain"></i>
                    <span>Doc Intel</span>
                </div>
            </header>

            <section class="upload-section">
                <h3><i class="fas fa-file-upload"></i> 문서 업로드</h3>
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="file-input"
                        accept=".pdf,.docx,.doc,.txt,.md,.py,.js,.ts,.jsx,.tsx,.html,.css,.hwp,.hwpx,.xls,.xlsx,.csv,.ppt,.pptx,.json,.xml,.yaml,.yml"
                        hidden>
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>클릭하여 파일을 선택하세요</p>
                    <span>(PDF, DOCX, TXT, MD, HWP 등)</span>
                </div>
                <div class="upload-options" style="margin-top: 10px;">
                    <select id="upload-category" class="model-select" style="width: 100%;">
                        <option value="">카테고리 없음</option>
                        <option value="marketing">마케팅 (전단/기사)</option>
                        <option value="legal">법무 (계약/규정)</option>
                        <option value="tech">기술 (매뉴얼/가이드)</option>
                        <option value="hr">인사 (복지/규정)</option>
                        <option value="company">회사소개 (비전/연혁)</option>
                    </select>
                </div>
            </section>

            <section class="document-list-section">
                <h3><i class="fas fa-list-ul"></i> 업로드된 문서</h3>
                <ul id="document-list" class="doc-list">
                    <!-- 리스트 아이템 동적 생성 -->
                    <li class="loading">조회 중...</li>
                </ul>
            </section>
        </aside>

        <!-- Main: Chat Interface -->
        <main class="chat-container">
            <header class="chat-header">
                <h2>AI 대화 인터페이스</h2>
                <div class="header-tools">
                    <select id="model-select" class="model-select">
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite (기본)</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro (고성능)</option>
                        <option value="gemini-3-flash-preview" selected>Gemini 3 Flash Preview (최신)</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                    </select>
                    <select id="filter-category" class="model-select">
                        <option value="">전체 문서 조회</option>
                        <option value="marketing">마케팅</option>
                        <option value="legal">법무</option>
                        <option value="tech">기술지원</option>
                        <option value="hr">인사/복지</option>
                        <option value="company">회사소개</option>
                    </select>
                    <div class="status-badge ready">준비됨</div>
                </div>
            </header>

            <div id="chat-messages" class="chat-messages">
                <div class="message ai-message">
                    반가워요! 업로드한 문서들에 대해 궁금한 점을 물어보세요.
                </div>
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="문서에 대해 질문하세요..." rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </footer>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
